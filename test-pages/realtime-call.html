<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📞 实时语音通话</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 { 
            color: #333; 
            margin-bottom: 10px; 
            font-size: 24px;
            text-align: center;
        }
        .subtitle { 
            color: #666; 
            margin-bottom: 30px; 
            font-size: 14px;
            text-align: center;
        }
        
        /* 通话界面 */
        .call-interface {
            text-align: center;
            padding: 40px 20px;
        }
        
        /* 状态指示器 */
        .call-status {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: #f7fafc;
            margin: 0 auto 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            transition: all 0.3s;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .call-status.disconnected { background: #f7fafc; }
        .call-status.connecting { 
            background: #fef3c7; 
            animation: pulse 1s infinite;
        }
        .call-status.connected { 
            background: #c6f6d5; 
        }
        .call-status.speaking {
            background: #90cdf4;
            animation: speak-pulse 0.5s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        @keyframes speak-pulse {
            0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(144, 205, 244, 0.7); }
            50% { transform: scale(1.05); box-shadow: 0 0 0 20px rgba(144, 205, 244, 0); }
        }
        
        /* 控制按钮 */
        .call-controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 30px;
        }
        .btn {
            padding: 15px 30px;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-call { 
            background: #48bb78; 
            color: white;
        }
        .btn-call:hover:not(:disabled) { 
            background: #38a169;
            transform: translateY(-2px);
        }
        .btn-hangup { 
            background: #f56565; 
            color: white;
        }
        .btn-hangup:hover:not(:disabled) { 
            background: #e53e3e;
            transform: translateY(-2px);
        }
        .btn-mic {
            background: #ed8936;
            color: white;
        }
        
        /* 音量指示器 */
        .volume-meter {
            width: 100%;
            height: 8px;
            background: #e2e8f0;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 20px;
        }
        .volume-bar {
            height: 100%;
            background: linear-gradient(90deg, #48bb78, #f56565);
            width: 0%;
            transition: width 0.1s;
        }
        
        /* 对话记录 */
        .conversation-log {
            background: #f7fafc;
            border-radius: 12px;
            padding: 20px;
            max-height: 300px;
            overflow-y: auto;
        }
        .log-entry {
            margin-bottom: 15px;
            padding: 10px 15px;
            border-radius: 8px;
        }
        .log-entry.user {
            background: #bee3f8;
            margin-left: 20%;
        }
        .log-entry.agent {
            background: #c6f6d5;
            margin-right: 20%;
        }
        .log-entry.system {
            background: #e2e8f0;
            text-align: center;
            font-size: 12px;
            color: #718096;
        }
        .log-entry .speaker {
            font-weight: 600;
            font-size: 12px;
            margin-bottom: 5px;
        }
        .log-entry .text {
            font-size: 14px;
            color: #2d3748;
        }
        
        /* 状态信息 */
        .status-info {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #718096;
            margin-top: 20px;
        }
        
        /* 麦克风权限提示 */
        .permission-notice {
            background: #fef3c7;
            border-left: 4px solid #f59e0b;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
            display: none;
        }
        .permission-notice.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📞 实时语音通话</h1>
        <p class="subtitle">像打电话一样和 AI 对话</p>
        
        <div class="permission-notice" id="permissionNotice">
            🔒 需要麦克风权限才能进行语音通话
        </div>
        
        <div class="call-interface">
            <div class="call-status" id="callStatus">📞</div>
            
            <div class="volume-meter">
                <div class="volume-bar" id="volumeBar"></div>
            </div>
            
            <div class="call-controls">
                <button class="btn btn-call" id="btnCall" onclick="startCall()">
                    📞 拨号
                </button>
                <button class="btn btn-hangup" id="btnHangup" onclick="endCall()" disabled>
                    📴 挂断
                </button>
                <button class="btn btn-mic" id="btnMic" onclick="toggleMic()" disabled>
                    🎤 静音
                </button>
            </div>
        </div>
        
        <div class="conversation-log" id="conversationLog">
            <div class="log-entry system">
                准备就绪，点击"拨号"开始通话
            </div>
        </div>
        
        <div class="status-info">
            <span id="connectionStatus">🔴 未连接</span>
            <span id="audioStatus">🔇 麦克风关闭</span>
        </div>
    </div>

    <!-- 引入 SDK -->
    <script src="../sdk/voice-gateway.js"></script>
    
    <script>
        // 全局变量
        let gateway = null;
        let audioContext = null;
        let mediaStream = null;
        let analyser = null;
        let isMuted = false;
        let isSpeaking = false;
        
        const WS_URL = "ws://localhost:8765";
        const SAMPLE_RATE = 16000;
        const CHUNK_SIZE = 1024; // ~64ms @ 16kHz
        
        // 日志函数
        function addLog(text, type = 'system') {
            const log = document.getElementById('conversationLog');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            
            const speaker = type === 'user' ? '👤 你' : (type === 'agent' ? '🤖 Agent' : '💬');
            entry.innerHTML = `
                <div class="speaker">${speaker}</div>
                <div class="text">${text}</div>
            `;
            log.appendChild(entry);
            log.scrollTop = log.scrollHeight;
        }
        
        // 更新状态
        function updateCallStatus(status) {
            const el = document.getElementById('callStatus');
            const btnCall = document.getElementById('btnCall');
            const btnHangup = document.getElementById('btnHangup');
            const btnMic = document.getElementById('btnMic');
            const connStatus = document.getElementById('connectionStatus');
            
            switch(status) {
                case 'disconnected':
                    el.className = 'call-status disconnected';
                    el.textContent = '📞';
                    btnCall.disabled = false;
                    btnHangup.disabled = true;
                    btnMic.disabled = true;
                    connStatus.textContent = '🔴 未连接';
                    break;
                case 'connecting':
                    el.className = 'call-status connecting';
                    el.textContent = '⏳';
                    btnCall.disabled = true;
                    btnHangup.disabled = false;
                    btnMic.disabled = true;
                    connStatus.textContent = '🟡 连接中...';
                    break;
                case 'connected':
                    el.className = 'call-status connected';
                    el.textContent = '📞';
                    btnCall.disabled = false;
                    btnHangup.disabled = false;
                    btnMic.disabled = false;
                    connStatus.textContent = '🟢 通话中';
                    break;
                case 'speaking':
                    el.className = 'call-status speaking';
                    el.textContent = '🎤';
                    connStatus.textContent = '🔵 正在说话...';
                    break;
            }
        }
        
        // 更新音量
        function updateVolume(volume) {
            const bar = document.getElementById('volumeBar');
            bar.style.width = `${Math.min(100, volume * 2)}%`;
        }
        
        // 更新字幕
        function updateSubtitle(text, type, isFinal) {
            const subtitleId = type === 'user' ? 'userSubtitle' : 'agentSubtitle';
            let subtitle = document.getElementById(subtitleId);
            
            if (!subtitle) {
                // 创建字幕元素
                subtitle = document.createElement('div');
                subtitle.id = subtitleId;
                subtitle.className = `subtitle ${type}-subtitle`;
                
                const section = type === 'user' ? 
                    document.querySelector('.user-section') : 
                    document.querySelector('.agent-section');
                
                if (section) {
                    section.appendChild(subtitle);
                }
            }
            
            subtitle.textContent = text;
            
            if (isFinal) {
                subtitle.classList.add('final');
                // 3 秒后隐藏字幕
                setTimeout(() => {
                    subtitle.style.opacity = '0';
                    setTimeout(() => subtitle.remove(), 500);
                }, 3000);
            }
        }
        
        // 开始通话
        async function startCall() {
            addLog('正在拨号...', 'system');
            updateCallStatus('connecting');
            
            try {
                // 1. 请求麦克风权限
                addLog('请求麦克风权限...', 'system');
                mediaStream = await navigator.mediaDevices.getUserMedia({
                    audio: {
                        echoCancellation: true,
                        noiseSuppression: true,
                        sampleRate: SAMPLE_RATE
                    }
                });
                
                document.getElementById('audioStatus').textContent = '🎤 麦克风开启';
                addLog('✅ 麦克风已开启', 'system');
                
                // 2. 初始化 AudioContext
                audioContext = new (window.AudioContext || window.webkitAudioContext)({
                    sampleRate: SAMPLE_RATE
                });
                
                // 3. 创建分析器（用于音量检测）
                const source = audioContext.createMediaStreamSource(mediaStream);
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 256;
                source.connect(analyser);
                
                // 4. 启动音量监测
                startVolumeMonitor();
                
                // 5. 连接 WebSocket
                gateway = new VoiceGateway({
                    url: WS_URL,
                    autoPlayAudio: true,
                    onConnected: () => {
                        addLog('✅ 已连接到语音网关', 'system');
                        updateCallStatus('connected');
                        startAudioCapture();
                    },
                    onDisconnected: () => {
                        addLog('🔴 连接已断开', 'system');
                        updateCallStatus('disconnected');
                    },
                    onReply: (text) => {
                        addLog(text, 'agent');
                        updateSubtitle(text, 'agent', true);
                    },
                    onAudio: (audio) => {
                        setAudioPlaying(true);
                    },
                    onError: (error) => {
                        addLog(`❌ 错误：${error.message}`, 'system');
                    },
                    onStatus: (status) => {
                        if (status === 'processing') {
                            addLog('🤖 Agent 正在思考...', 'system');
                        } else if (status === 'recognizing') {
                            addLog('👂 正在识别语音...', 'system');
                        }
                    }
                });
                
                await gateway.connect();
                
            } catch (error) {
                addLog(`❌ 失败：${error.message}`, 'system');
                updateCallStatus('disconnected');
                
                if (error.name === 'NotAllowedError') {
                    document.getElementById('permissionNotice').classList.add('show');
                }
            }
        }
        
        // 结束通话
        function endCall() {
            addLog('挂断通话...', 'system');
            
            // 停止音频采集
            stopAudioCapture();
            
            // 断开 WebSocket
            if (gateway) {
                gateway.disconnect();
                gateway = null;
            }
            
            // 关闭麦克风
            if (mediaStream) {
                mediaStream.getTracks().forEach(track => track.stop());
                mediaStream = null;
            }
            
            // 关闭 AudioContext
            if (audioContext) {
                audioContext.close();
                audioContext = null;
            }
            
            updateCallStatus('disconnected');
            document.getElementById('audioStatus').textContent = '🔇 麦克风关闭';
            addLog('通话已结束', 'system');
        }
        
        // 切换静音
        function toggleMic() {
            isMuted = !isMuted;
            const btn = document.getElementById('btnMic');
            
            if (isMuted) {
                btn.textContent = '🔇 取消静音';
                document.getElementById('audioStatus').textContent = '🔇 已静音';
                addLog('已静音', 'system');
            } else {
                btn.textContent = '🎤 静音';
                document.getElementById('audioStatus').textContent = '🎤 麦克风开启';
                addLog('取消静音', 'system');
            }
        }
        
        // 音量监测
        function startVolumeMonitor() {
            const dataArray = new Uint8Array(analyser.frequencyBinCount);
            
            function update() {
                if (!analyser) return;
                
                analyser.getByteFrequencyData(dataArray);
                const average = dataArray.reduce((a, b) => a + b) / dataArray.length;
                updateVolume(average);
                
                // 检测是否正在说话
                if (average > 30 && !isMuted) {
                    if (!isSpeaking) {
                        isSpeaking = true;
                        updateCallStatus('speaking');
                    }
                } else {
                    if (isSpeaking) {
                        isSpeaking = false;
                        updateCallStatus('connected');
                    }
                }
                
                requestAnimationFrame(update);
            }
            
            update();
        }
        
        // 音频采集和发送
        let audioProcessor = null;
        let isStreaming = false;
        
        function startAudioCapture() {
            const scriptProcessor = audioContext.createScriptProcessor(CHUNK_SIZE, 1, 1);
            
            scriptProcessor.onaudioprocess = (e) => {
                if (isMuted || !gateway || !gateway.isConnected() || !isStreaming) return;
                
                const inputData = e.inputBuffer.getChannelData(0);
                
                // Float32 → Int16 (PCM 16bit)
                const int16Data = new Int16Array(inputData.length);
                for (let i = 0; i < inputData.length; i++) {
                    const s = Math.max(-1, Math.min(1, inputData[i]));
                    int16Data[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
                }
                
                // 发送原始 PCM 数据到网关
                gateway.ws.send(int16Data.buffer);
            };
            
            audioProcessor = scriptProcessor;
            
            // 连接到麦克风源
            const source = audioContext.createMediaStreamSource(mediaStream);
            source.connect(audioProcessor);
            audioProcessor.connect(audioContext.destination);
            
            // 开始音频流
            isStreaming = true;
            if (gateway && gateway.isConnected()) {
                gateway.send({ type: 'audio_stream_start' });
            }
            
            addLog('🎤 开始采集音频', 'system');
        }
        
        function stopAudioCapture() {
            if (audioProcessor) {
                // 通知网关音频流结束
                if (gateway && gateway.isConnected() && isStreaming) {
                    gateway.send({ type: 'audio_stream_stop' });
                    isStreaming = false;
                }
                
                audioProcessor.disconnect();
                audioProcessor = null;
                addLog('⏹️ 停止音频采集', 'system');
            }
        }
        
        // 页面加载完成
        window.addEventListener('DOMContentLoaded', () => {
            addLog('📞 实时语音通话准备就绪', 'system');
            addLog('💡 提示：点击"拨号"开始通话，说完后等待 Agent 回复', 'system');
            
            // 检查浏览器支持
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                addLog('⚠️ 您的浏览器不支持麦克风采集', 'system');
                document.getElementById('btnCall').disabled = true;
            }
        });
        
        // 页面卸载时清理
        window.addEventListener('beforeunload', () => {
            endCall();
        });
    </script>
</body>
</html>
