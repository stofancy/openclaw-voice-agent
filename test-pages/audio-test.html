<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音频测试</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            max-width: 500px;
            margin: 50px auto;
            padding: 20px;
            text-align: center;
        }
        button {
            padding: 15px 30px;
            font-size: 18px;
            margin: 10px;
            cursor: pointer;
            border: 2px solid #ddd;
            border-radius: 8px;
            background: white;
        }
        button:hover {
            background: #f0f0f0;
        }
        #status {
            margin-top: 20px;
            font-size: 18px;
            color: #666;
            padding: 15px;
            background: #f9f9f9;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <h1>🎤 音频测试</h1>
    <p>测试麦克风和扬声器</p>
    
    <div>
        <button onclick="testMic()">测试麦克风</button>
        <button onclick="testSpeaker()">测试扬声器</button>
    </div>
    
    <div id="status">点击按钮测试</div>
    
    <script>
        const statusDiv = document.getElementById('status');
        let mediaStream = null;
        let audioContext = null;
        let analyser = null;
        let microphone = null;
        
        async function testMic() {
            statusDiv.textContent = '正在请求麦克风权限...';
            
            try {
                mediaStream = await navigator.mediaDevices.getUserMedia({
                    audio: true
                });
                
                statusDiv.textContent = '✅ 麦克风工作正常！';
                
                audioContext = new AudioContext();
                analyser = analyser || audioContext.createAnalyser();
                microphone = audioContext.createMediaStreamSource(mediaStream);
                
                analyser.smoothingTimeConstant = 0.8;
                analyser.fftSize = 1024;
                
                microphone.connect(analyser);
                
                function checkVolume() {
                    if (!analyser) return;
                    
                    const array = new Uint8Array(analyser.frequencyBinCount);
                    analyser.getByteFrequencyData(array);
                    const values = array.reduce((a, b) => a + b, 0) / array.length;
                    
                    if (values > 10) {
                        statusDiv.textContent = '🎤 检测到声音：' + Math.round(values) + '%';
                    }
                    
                    requestAnimationFrame(checkVolume);
                }
                
                checkVolume();
                
            } catch (err) {
                statusDiv.textContent = '❌ 麦克风失败：' + err.message;
                console.error('麦克风错误:', err);
            }
        }
        
        function testSpeaker() {
            statusDiv.textContent = '正在播放测试音...';
            
            if (!audioContext) {
                audioContext = new AudioContext();
            }
            
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.frequency.value = 440;
            oscillator.type = 'sine';
            gainNode.gain.value = 0.3;
            
            oscillator.start();
            
            setTimeout(function() {
                oscillator.stop();
                statusDiv.textContent = '✅ 扬声器工作正常！';
            }, 1000);
        }
    </script>
</body>
</html>
